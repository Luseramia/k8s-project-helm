apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seaweedfs-s3
  annotations:
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    nginx.ingress.kubernetes.io/whitelist-source-range: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22"

    # อนุญาตไฟล์ใหญ่ (default 1MB เล็กไปสำหรับ S3)
    nginx.ingress.kubernetes.io/proxy-body-size: "5g"
    # timeout ยาวขึ้นสำหรับ multipart upload
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    # ปิด buffering เพื่อ stream upload/download
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # cert-manager (ถ้าใช้)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "http" # เปลี่ยนเป็น http เพราะ seaweed เปิดแบบ http
    nginx.ingress.kubernetes.io/backend-https-verify: "false"  # ปิด verify เพราะ self-signed
    acme.cert-manager.io/http01-ingress-class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-dns01"
    # rate limit ป้องกัน abuse (request/sec ต่อ IP)
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/server-snippet: |
      # Block admin/status endpoints
      location ~ ^/(status|metrics|admin|cluster|stats) {
        return 403;
      }
      
      # Block listing root bucket (อย่าให้คนเห็น bucket ทั้งหมด)
      location = / {
        return 403;
      }
      
      # Block direct bucket listing แบบไม่มี auth
      if ($request_method = GET) {
        set $block_list 0;
        if ($request_uri ~ "^/[^/]+/?$") {
          set $block_list 1;
        }
        if ($args !~ "X-Amz-Signature") {
          set $block_list "${block_list}1";
        }
        if ($block_list = "11") {
          return 403;
        }
      }

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - s3.tarchunk.win
      secretName: s3-ingress-tls
  rules:
    - host: s3.tarchunk.win
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seaweedfs-s3
                port:
                  number: 8333
