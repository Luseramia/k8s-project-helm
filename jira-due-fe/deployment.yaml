apiVersion: apps/v1
kind: Deployment
metadata:
  name: jira-due-frontend
  namespace: jira-due
  labels:
    app: jira-due-frontend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: jira-due-frontend
  template:
    metadata:
      labels:
        app: jira-due-frontend
      annotations:
        consul.hashicorp.com/connect-inject: "false"
    spec:
      serviceAccountName: jira-due-frontend
      dnsPolicy: ClusterFirst
      containers:
        - name: jira-due-frontend
          image: registry.registry.svc.cluster.local:5000/jira-due-frontend:6
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      restartPolicy: Always
