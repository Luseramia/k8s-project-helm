# Wave -1: External Secrets Operator (ESO)
# ต้องขึ้นก่อนทุกอย่าง เพราะ wave 0 (monitoring-base) ใช้ CRD
# SecretStore/ExternalSecret ที่มากับ operator ตัวนี้
#
# ตรวจสอบ version ล่าสุดก่อน pin:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm repo update && helm search repo external-secrets/external-secrets
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.7    # ← pin/verify version
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true       # ติดตั้ง CRDs (SecretStore/ExternalSecret/...) มากับ operator
        replicaCount: 1
        webhook:
          replicaCount: 1
        certController:
          replicaCount: 1

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true    # CRDs ใหญ่ — เลี่ยง annotation limit
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
