# Wave 4: ServiceMonitors + PrometheusRule
# ต้องรอ Prometheus operator + CRDs พร้อมก่อน (จาก wave 1)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-extras
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Luseramia/k8s-project-helm.git    # ← เปลี่ยน
    targetRevision: main
    path: grafana-stack/manifests
    directory:
      recurse: false
      include: '{servicemonitors.yaml,pve-exporter.yaml}'

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
