---
# Namespace สำหรับ observability ทั้งหมด
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    name: monitoring
    pod-security.kubernetes.io/enforce: privileged
---
# Secret สำหรับ Loki ต่อ SeaweedFS S3
# *** เปลี่ยนค่าตามจริง ***
apiVersion: v1
kind: Secret
metadata:
  name: loki-s3-credentials
  namespace: monitoring
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "YOUR_SEAWEEDFS_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "YOUR_SEAWEEDFS_SECRET_KEY"
---
# Secret สำหรับ Tempo ต่อ SeaweedFS S3
apiVersion: v1
kind: Secret
metadata:
  name: tempo-s3-credentials
  namespace: monitoring
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "YOUR_SEAWEEDFS_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "YOUR_SEAWEEDFS_SECRET_KEY"
