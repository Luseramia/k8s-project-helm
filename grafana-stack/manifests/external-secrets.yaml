# External Secrets configuration
# ดึง SeaweedFS credentials จาก Vault → สร้าง k8s Secret อัตโนมัติ
#
# Pre-requisites:
# 1. External Secrets Operator (ESO) ติดตั้งแล้ว
# 2. Vault enable Kubernetes auth method:
#    vault auth enable kubernetes
# 3. สร้าง policy + role ใน Vault สำหรับ ESO อ่าน
# 4. เก็บ credentials ใน Vault:
#    vault kv put secret/observability/seaweedfs \
#      access_key=YOUR_KEY \
#      secret_key=YOUR_SECRET

---
# SecretStore — config การเชื่อม Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: monitoring
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"   # ← ปรับเป็น Vault URL จริง
      path: "observability"   # ← KV v2 mount จริงในคลัสเตอร์
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets-monitoring"               # Vault role ที่อนุญาตให้อ่าน

---
# ExternalSecret สำหรับ Loki ดึง S3 creds
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-s3-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h    # refresh ค่าจาก Vault ทุก 1 ชม.
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: loki-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: seaweedfs
        property: access_key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: seaweedfs
        property: secret_key

---
# ExternalSecret สำหรับ Tempo ดึง S3 creds (ใช้ secret เดียวกัน)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tempo-s3-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: tempo-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: seaweedfs
        property: access_key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: seaweedfs
        property: secret_key

---
# (Optional) ExternalSecret สำหรับ Grafana admin password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: grafana
        property: admin_user
    - secretKey: admin-password
      remoteRef:
        key: grafana
        property: admin_password
