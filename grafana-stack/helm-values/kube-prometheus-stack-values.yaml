# kube-prometheus-stack values
# ติดตั้ง: helm install kps prometheus-community/kube-prometheus-stack -n monitoring -f kube-prometheus-stack-values.yaml
#
# *** จุดที่ต้องแก้ ***
# - storageClassName (4 จุด): เปลี่ยนเป็น storage class ที่ใช้ได้ใน cluster
# - grafana.ingress.hosts: เปลี่ยน hostname
# - grafana.adminPassword: ตั้ง password ที่ปลอดภัย

fullnameOverride: kps

# ─────────────────────────────────────────────────────
# Prometheus
# ─────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Retention — เก็บ 7 วัน local แล้วค่อย offload ทีหลังถ้าต้องการ
    retention: 7d
    retentionSize: 25GiB

    # อย่าใช้ helm chart selector เท่านั้น — รับ ServiceMonitor ทุกตัวใน cluster
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false

    # Resources
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        memory: 4Gi

    # Persistent storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: truenas-nfs-storage    # ← เปลี่ยนตาม storage class จริง
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi

    # Pod placement — ถ้ามี node label role=observability
    # nodeSelector:
    #   role: observability

    # Enable remote write receiver ถ้าจะให้ Prometheus Agent อื่น push เข้ามา
    enableRemoteWriteReceiver: true

    # Web config
    externalLabels:
      cluster: home-k8s
      environment: production

# ─────────────────────────────────────────────────────
# Alertmanager
# ─────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: truenas-nfs-storage    # ← เปลี่ยน
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
  # ตัวอย่าง config — ปรับเป็น Slack/email/webhook ของจริง
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default'
      routes:
        - matchers:
            - severity = critical
          receiver: 'critical'
    receivers:
      - name: 'default'
      - name: 'critical'
        # webhook_configs:
        #   - url: 'http://your-webhook'

# ─────────────────────────────────────────────────────
# Grafana
# ─────────────────────────────────────────────────────
grafana:
  enabled: true
  # ดึง admin user/password จาก secret "grafana-admin" (สร้างโดย ExternalSecret)
  # ดู manifests/external-secrets.yaml
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  persistence:
    enabled: true
    type: pvc
    storageClassName: truenas-nfs-storage    # ← เปลี่ยน
    accessModes: ["ReadWriteOnce"]
    size: 5Gi

  # Ingress ผ่าน nginx ของคุณ
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    hosts:
      - grafana.lan    # ← เปลี่ยน
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.yourdomain.com

  # Datasources เพิ่มเติม (Loki + Tempo)
  # Prometheus datasource มากับ chart อยู่แล้ว
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      jsonData:
        maxLines: 1000
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: "trace_id=(\\w+)"
            name: TraceID
            url: '$${__value.raw}'
    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3100
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: '-1h'
          spanEndTimeShift: '1h'
          tags: ['service.name']
        tracesToMetrics:
          datasourceUid: prometheus

  # Dashboards เพิ่มเติม — provider auto-import จาก grafana.com
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      # K8s cluster overview
      k8s-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      # node-exporter full
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      # Nginx ingress
      nginx-ingress:
        gnetId: 9614
        revision: 1
        datasource: Prometheus
      # Loki / Promtail dashboard
      loki:
        gnetId: 13639
        revision: 2
        datasource: Loki
      # ArgoCD
      argocd:
        gnetId: 14584
        revision: 1
        datasource: Prometheus
      # Vault
      vault:
        gnetId: 12904
        revision: 6
        datasource: Prometheus

  # SMTP สำหรับส่ง alert email (optional)
  # grafana.ini:
  #   smtp:
  #     enabled: true
  #     host: smtp.gmail.com:587
  #     user: your-email
  #     password: your-app-password
  #     from_address: alerts@yourdomain.com

# ─────────────────────────────────────────────────────
# node-exporter (host metrics)
# ─────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ─────────────────────────────────────────────────────
# kube-state-metrics (k8s object metrics)
# ─────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ─────────────────────────────────────────────────────
# Built-in scrape jobs สำหรับ k8s components
# ─────────────────────────────────────────────────────
kubelet:
  enabled: true
  serviceMonitor:
    cAdvisor: true
    probes: true
    resource: true

kubeApiServer:
  enabled: true

kubeControllerManager:
  enabled: true
  # ถ้า control plane เข้าถึงไม่ได้ (managed k8s) ให้ปิด
  # enabled: false

kubeScheduler:
  enabled: true

kubeProxy:
  enabled: true

kubeEtcd:
  enabled: true

coreDns:
  enabled: true

# Prometheus Operator (จัดการ CRD)
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
