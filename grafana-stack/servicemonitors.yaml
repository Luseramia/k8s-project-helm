# ServiceMonitors สำหรับ apps ที่รันอยู่ใน cluster
# กดให้ Prometheus มา scrape metrics จากแต่ละ service
#
# *** ต้องปรับ ***
# - namespace ของแต่ละ app (ปัจจุบันสมมติว่าทุกตัวอยู่ default หรือ namespace ตามชื่อ)
# - port name ต้องตรงกับที่ service ของจริงเปิด
# - บาง app ต้อง config เปิด metrics endpoint ก่อน (ดู comment แต่ละ block)

---
# ─────────────────────────────────────────────────────
# Nginx Ingress Controller
# ก่อนใช้: ตอนติดตั้ง helm chart ต้องเปิด controller.metrics.enabled=true
# ─────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nginx-ingress
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - ingress-nginx        # ← namespace ของ nginx-ingress
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
      app.kubernetes.io/component: controller
  endpoints:
    - port: metrics
      interval: 30s

---
# ─────────────────────────────────────────────────────
# HashiCorp Vault
# ก่อนใช้: ใน vault config เปิด telemetry + unseal-aware metrics
#   telemetry { prometheus_retention_time = "30s" disable_hostname = true }
# Vault token policy ต้องอนุญาต read /sys/metrics
# ─────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vault
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - vault        # ← namespace ของ vault
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
  endpoints:
    - port: http
      path: /v1/sys/metrics
      params:
        format: ['prometheus']
      interval: 30s
      scheme: http
      # ถ้าต้อง token authentication:
      # bearerTokenSecret:
      #   name: vault-metrics-token
      #   key: token

---
# ─────────────────────────────────────────────────────
# HashiCorp Consul
# Consul มี Prometheus endpoint built-in: /v1/agent/metrics?format=prometheus
# ก่อนใช้: ใน consul config เปิด telemetry { prometheus_retention_time = "30s" }
# ─────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: consul
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - consul
  selector:
    matchLabels:
      app: consul
      component: server
  endpoints:
    - port: http
      path: /v1/agent/metrics
      params:
        format: ['prometheus']
      interval: 30s

---
# ─────────────────────────────────────────────────────
# ArgoCD
# มี metrics endpoint built-in สำหรับทุก component
# ─────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-server
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - argocd
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server-metrics
  endpoints:
    - port: metrics
      interval: 30s

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-repo-server
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - argocd
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  endpoints:
    - port: metrics
      interval: 30s

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-application-controller
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - argocd
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-metrics
  endpoints:
    - port: metrics
      interval: 30s

---
# ─────────────────────────────────────────────────────
# Jenkins
# ก่อนใช้: ติดตั้ง Prometheus plugin ใน Jenkins
# - Manage Jenkins → Plugins → ติดตั้ง "Prometheus metrics plugin"
# - default endpoint: /prometheus
# ─────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jenkins
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - jenkins
  selector:
    matchLabels:
      app.kubernetes.io/name: jenkins
  endpoints:
    - port: http
      path: /prometheus
      interval: 30s

---
# ─────────────────────────────────────────────────────
# n8n
# ก่อนใช้: ตั้ง env variable
#   N8N_METRICS=true
#   N8N_METRICS_INCLUDE_DEFAULT_METRICS=true
#   N8N_METRICS_INCLUDE_API_ENDPOINTS=true
# ─────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: n8n
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - n8n
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  endpoints:
    - port: http
      path: /metrics
      interval: 30s

---
# ─────────────────────────────────────────────────────
# ตัวอย่าง ServiceMonitor สำหรับ Node.js / Bun app
# สมมติ app ของคุณ expose /metrics ที่ port 3000
# ใช้ library: prom-client (Node.js), หรือ OpenTelemetry SDK
# ─────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: my-nodejs-app
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - default      # ← namespace ของ app
  selector:
    matchLabels:
      app: my-nodejs-app    # ← label ของ service
  endpoints:
    - port: http             # ← port name ใน service
      path: /metrics
      interval: 30s

---
# ─────────────────────────────────────────────────────
# Alertmanager: PrometheusRule ตัวอย่าง
# กฎ alert พื้นฐานที่ทุก cluster ควรมี
# ─────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: basic-alerts
  namespace: monitoring
  labels:
    release: kps
spec:
  groups:
    - name: cluster-health
      interval: 30s
      rules:
        - alert: NodeDown
          expr: up{job="node-exporter"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} ลงไปแล้ว"
            description: "Node ไม่ตอบ metrics นานเกิน 5 นาที"

        - alert: HighMemoryUsage
          expr: |
            (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) 
            / node_memory_MemTotal_bytes > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Memory ใช้สูงเกิน 90% บน {{ $labels.instance }}"

        - alert: HighCPUUsage
          expr: |
            100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "CPU ใช้สูงเกิน 90% บน {{ $labels.instance }}"

        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} crash loop"

        - alert: PVCNearFull
          expr: |
            kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} ใช้พื้นที่เกิน 85%"
